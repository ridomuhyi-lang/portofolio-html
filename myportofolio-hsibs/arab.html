<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Arabic Learning Project - Ridho</title>
    <style>
        /* Variabel warna yang sinkron dengan index.html kamu */
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --card-bg: #f8f9fa;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .project-container {
            background-color: var(--card-bg);
            max-width: 1000px; /* Diperlebar sedikit agar muat 2 video berdampingan */
            width: 100%;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .btn-back {
            display: inline-block;
            padding: 8px 20px;
            background-color: #38bdf8;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .btn-back:hover {
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        h1 span {
            color: #38bdf8;
        }

        p {
            line-height: 1.6;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* Pembungkus Grid Utama untuk Video-Video Lu */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* Pembungkus Video biar Responsif di HP & Laptop */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Pola aspek rasio 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="project-container">
        <a href="index.html#experience" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali</a>
        <h1>Arabic Learning <span>Project</span></h1>
        <p>Dokumentasi video pembelajaran dan praktik bahasa Arab.</p>
        
        <div class="video-grid">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/9NTjmG1oVRs?si=kN1RcfMMDzQwU9vT" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
             
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/AJHqizBVkYk?si=T_MmrVhqKlmZThmw" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
        }
    </script>

</body>
</html>
